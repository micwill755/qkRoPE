<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <rect width="900" height="430" fill="white"/>

  <text x="40" y="45" font-family="serif" font-size="24" fill="#222">From token embeddings to Q, K, V</text>

  <rect x="45" y="95" width="150" height="210" fill="#f7f7f7" stroke="#444"/>
  <text x="70" y="125" font-family="serif" font-size="18" fill="#222">inputs</text>
  <text x="70" y="152" font-family="serif" font-size="16" fill="#555">6 tokens × 3 dims</text>
  <text x="70" y="190" font-family="monospace" font-size="14" fill="#222">the</text>
  <text x="70" y="215" font-family="monospace" font-size="14" fill="#222">cat</text>
  <text x="70" y="240" font-family="monospace" font-size="14" fill="#222">sat</text>
  <text x="70" y="265" font-family="monospace" font-size="14" fill="#222">on</text>
  <text x="70" y="290" font-family="monospace" font-size="14" fill="#222">the</text>
  <text x="70" y="315" font-family="monospace" font-size="14" fill="#222">mat</text>

  <line x1="205" y1="200" x2="300" y2="135" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="205" y1="200" x2="300" y2="200" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="205" y1="200" x2="300" y2="265" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="315" y="85" width="155" height="80" fill="#eaf3ff" stroke="#1f77b4"/>
  <text x="340" y="115" font-family="serif" font-size="18" fill="#1f77b4">W_query</text>
  <text x="340" y="142" font-family="serif" font-size="15" fill="#1f77b4">3 × 2 projection</text>

  <rect x="315" y="180" width="155" height="80" fill="#f0fff0" stroke="#2ca02c"/>
  <text x="340" y="210" font-family="serif" font-size="18" fill="#2ca02c">W_key</text>
  <text x="340" y="237" font-family="serif" font-size="15" fill="#2ca02c">3 × 2 projection</text>

  <rect x="315" y="275" width="155" height="80" fill="#fff4e8" stroke="#d07900"/>
  <text x="340" y="305" font-family="serif" font-size="18" fill="#d07900">W_value</text>
  <text x="340" y="332" font-family="serif" font-size="15" fill="#d07900">3 × 2 projection</text>

  <line x1="480" y1="125" x2="585" y2="125" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="220" x2="585" y2="220" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="315" x2="585" y2="315" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="85" width="190" height="80" fill="#eaf3ff" stroke="#1f77b4"/>
  <text x="625" y="115" font-family="serif" font-size="18" fill="#1f77b4">Q</text>
  <text x="625" y="142" font-family="serif" font-size="15" fill="#1f77b4">6 query vectors × 2 dims</text>

  <rect x="600" y="180" width="190" height="80" fill="#f0fff0" stroke="#2ca02c"/>
  <text x="625" y="210" font-family="serif" font-size="18" fill="#2ca02c">K</text>
  <text x="625" y="237" font-family="serif" font-size="15" fill="#2ca02c">6 key vectors × 2 dims</text>

  <rect x="600" y="275" width="190" height="80" fill="#fff4e8" stroke="#d07900"/>
  <text x="625" y="305" font-family="serif" font-size="18" fill="#d07900">V</text>
  <text x="625" y="332" font-family="serif" font-size="15" fill="#d07900">6 value vectors × 2 dims</text>

  <text x="300" y="390" font-family="serif" font-size="17" fill="#222">Same input tokens, three learned views: what to ask for, how to be found, what to provide.</text>
</svg>
