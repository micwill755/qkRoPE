<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="460" fill="white"/>
  <text x="40" y="45" font-family="serif" font-size="24" fill="#222">RoPE rotates pairs of embedding dimensions</text>

  <text x="45" y="90" font-family="serif" font-size="18" fill="#222">One token's Q vector, dim = 24</text>

  <!-- 24 dimensions as blocks -->
  <g font-family="serif" font-size="13" text-anchor="middle">
    <rect x="45" y="115" width="30" height="45" fill="#eaf3ff" stroke="#1f77b4"/><text x="60" y="143">0</text>
    <rect x="75" y="115" width="30" height="45" fill="#eaf3ff" stroke="#1f77b4"/><text x="90" y="143">1</text>
    <rect x="115" y="115" width="30" height="45" fill="#f0fff0" stroke="#2ca02c"/><text x="130" y="143">2</text>
    <rect x="145" y="115" width="30" height="45" fill="#f0fff0" stroke="#2ca02c"/><text x="160" y="143">3</text>
    <rect x="185" y="115" width="30" height="45" fill="#fff4e8" stroke="#d07900"/><text x="200" y="143">4</text>
    <rect x="215" y="115" width="30" height="45" fill="#fff4e8" stroke="#d07900"/><text x="230" y="143">5</text>
    <text x="280" y="143" fill="#555">...</text>
    <rect x="340" y="115" width="30" height="45" fill="#f7eaff" stroke="#9467bd"/><text x="355" y="143">22</text>
    <rect x="370" y="115" width="30" height="45" fill="#f7eaff" stroke="#9467bd"/><text x="385" y="143">23</text>
  </g>

  <text x="55" y="190" font-family="serif" font-size="16" fill="#1f77b4">pair 0</text>
  <text x="124" y="190" font-family="serif" font-size="16" fill="#2ca02c">pair 1</text>
  <text x="193" y="190" font-family="serif" font-size="16" fill="#d07900">pair 2</text>
  <text x="338" y="190" font-family="serif" font-size="16" fill="#9467bd">pair 11</text>

  <rect x="470" y="95" width="360" height="250" fill="#fff" stroke="#c9c9c9"/>
  <text x="495" y="130" font-family="serif" font-size="20" fill="#222">Position m chooses the angle</text>
  <text x="495" y="170" font-family="serif" font-size="17" fill="#222">pair 0: angle = mθ₀</text>
  <text x="495" y="200" font-family="serif" font-size="17" fill="#222">pair 1: angle = mθ₁</text>
  <text x="495" y="230" font-family="serif" font-size="17" fill="#222">pair 2: angle = mθ₂</text>
  <text x="495" y="260" font-family="serif" font-size="17" fill="#222">...</text>
  <text x="495" y="290" font-family="serif" font-size="17" fill="#222">pair 11: angle = mθ₁₁</text>
  <text x="495" y="325" font-family="serif" font-size="16" fill="#555">Same frequencies, different token positions.</text>

  <text x="45" y="265" font-family="serif" font-size="18" fill="#222">Not token pairs:</text>
  <text x="45" y="295" font-family="serif" font-size="16" fill="#555">RoPE does not rotate token 1 with token 2.</text>
  <text x="45" y="325" font-family="serif" font-size="16" fill="#555">It rotates dimension pairs inside each token row.</text>

  <text x="45" y="410" font-family="serif" font-size="17" fill="#222">many tiny 2D rotation planes inside the embedding dimension</text>
</svg>
