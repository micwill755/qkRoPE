<svg width="900" height="470" viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="white"/>
  <text x="40" y="45" font-family="serif" font-size="24" fill="#222">QKᵀ creates scores; scores mix V</text>

  <rect x="45" y="95" width="120" height="150" fill="#eaf3ff" stroke="#1f77b4"/>
  <text x="75" y="125" font-family="serif" font-size="20" fill="#1f77b4">Q</text>
  <text x="67" y="153" font-family="serif" font-size="15" fill="#1f77b4">6 × 2</text>
  <text x="60" y="195" font-family="serif" font-size="15" fill="#555">queries ask:</text>
  <text x="60" y="220" font-family="serif" font-size="15" fill="#555">what do I need?</text>

  <text x="190" y="178" font-family="serif" font-size="30" fill="#222">×</text>

  <rect x="235" y="95" width="120" height="150" fill="#f0fff0" stroke="#2ca02c"/>
  <text x="267" y="125" font-family="serif" font-size="20" fill="#2ca02c">Kᵀ</text>
  <text x="260" y="153" font-family="serif" font-size="15" fill="#2ca02c">2 × 6</text>
  <text x="250" y="195" font-family="serif" font-size="15" fill="#555">keys answer:</text>
  <text x="250" y="220" font-family="serif" font-size="15" fill="#555">do I match?</text>

  <line x1="370" y1="170" x2="460" y2="170" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="480" y="80" width="230" height="190" fill="#fafafa" stroke="#444"/>
  <text x="535" y="112" font-family="serif" font-size="20" fill="#222">scores = QKᵀ</text>
  <text x="555" y="140" font-family="serif" font-size="15" fill="#555">6 × 6 score table</text>
  <line x1="510" y1="160" x2="680" y2="160" stroke="#bbb"/>
  <line x1="510" y1="190" x2="680" y2="190" stroke="#bbb"/>
  <line x1="510" y1="220" x2="680" y2="220" stroke="#bbb"/>
  <line x1="510" y1="250" x2="680" y2="250" stroke="#bbb"/>
  <line x1="535" y1="155" x2="535" y2="260" stroke="#bbb"/>
  <line x1="565" y1="155" x2="565" y2="260" stroke="#bbb"/>
  <line x1="595" y1="155" x2="595" y2="260" stroke="#bbb"/>
  <line x1="625" y1="155" x2="625" y2="260" stroke="#bbb"/>
  <line x1="655" y1="155" x2="655" y2="260" stroke="#bbb"/>
  <text x="518" y="180" font-family="serif" font-size="13" fill="#222">q₀·k₀</text>
  <text x="578" y="180" font-family="serif" font-size="13" fill="#222">q₀·k₂</text>
  <text x="638" y="240" font-family="serif" font-size="13" fill="#222">q₃·k₄</text>

  <line x1="595" y1="280" x2="595" y2="335" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="615" y="313" font-family="serif" font-size="16" fill="#222">softmax turns scores into weights</text>

  <rect x="205" y="335" width="190" height="80" fill="#fff4e8" stroke="#d07900"/>
  <text x="240" y="365" font-family="serif" font-size="20" fill="#d07900">V</text>
  <text x="240" y="392" font-family="serif" font-size="15" fill="#d07900">content to mix</text>

  <text x="430" y="382" font-family="serif" font-size="30" fill="#222">×</text>

  <rect x="480" y="335" width="230" height="80" fill="#fff" stroke="#444"/>
  <text x="520" y="365" font-family="serif" font-size="20" fill="#222">output tokens</text>
  <text x="520" y="392" font-family="serif" font-size="15" fill="#555">weighted mixtures of V rows</text>

  <line x1="405" y1="375" x2="470" y2="375" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="450" font-family="serif" font-size="17" fill="#222">Scores decide how much to read. V provides the information being read.</text>
</svg>
