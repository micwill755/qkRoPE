<svg width="820" height="420" viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f77b4"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2ca02c"/>
    </marker>
  </defs>

  <rect width="820" height="420" fill="white"/>

  <!-- Coordinate plane -->
  <line x1="70" y1="260" x2="390" y2="260" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="370" x2="230" y2="70" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="230" cy="260" r="95" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Original and rotated pair -->
  <line x1="230" y1="260" x2="314" y2="212" stroke="#1f77b4" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <line x1="230" y1="260" x2="264" y2="169" stroke="#2ca02c" stroke-width="4" marker-end="url(#arrow-green)"/>
  <path d="M283 230 A61 61 0 0 0 251 203" fill="none" stroke="#9467bd" stroke-width="2.5"/>

  <text x="318" y="210" font-family="serif" font-size="17" fill="#1f77b4">original pair (x₁, x₂)</text>
  <text x="268" y="165" font-family="serif" font-size="17" fill="#2ca02c">rotated pair</text>
  <text x="270" y="222" font-family="serif" font-size="18" fill="#9467bd">mθ</text>
  <text x="395" y="266" font-family="serif" font-size="17" fill="#222">dim 1</text>
  <text x="238" y="72" font-family="serif" font-size="17" fill="#222">dim 2</text>

  <!-- Formula panel -->
  <rect x="465" y="70" width="305" height="270" fill="#fff" stroke="#c9c9c9" stroke-width="1.5"/>
  <text x="490" y="108" font-family="serif" font-size="20" fill="#222">RoPE applies the rotation matrix</text>
  <text x="490" y="145" font-family="serif" font-size="17" fill="#222">For token position m:</text>
  <text x="490" y="180" font-family="serif" font-size="18" fill="#222">angle = mθ</text>
  <text x="490" y="220" font-family="serif" font-size="18" fill="#222">[x₁, x₂] becomes</text>
  <text x="490" y="255" font-family="serif" font-size="18" fill="#2ca02c">[x₁ cos(mθ) - x₂ sin(mθ),</text>
  <text x="506" y="282" font-family="serif" font-size="18" fill="#2ca02c"> x₁ sin(mθ) + x₂ cos(mθ)]</text>
  <text x="490" y="320" font-family="serif" font-size="16" fill="#555">Same rotation matrix, now used inside attention.</text>
</svg>
